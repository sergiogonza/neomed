<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoMed</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: "Nunito Sans", sans-serif;
    background: #ffffff;
}

/* CANVAS */
canvas {
    width: 100%;
    height: 100%;
    display: block;
}

/* 🔥 OVERLAY CENTRADO PERFECTO */
.overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
    pointer-events: none;
    text-align: center;
}

/* TEXTO */
.title {
    font-size: 30px;
    letter-spacing: 8px;
    color: #1f2a44;
}

.subtitle {
    font-size: 13px;
    color: #6c757d;
    letter-spacing: 2px;
}

/* BOTÓN */
.btn {
    pointer-events: auto;
    padding: 12px 32px;
    background: transparent;
    color: #1f2a44;
    border: 2px solid #1f2a44;
    border-radius: 8px;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn:hover {
    background: #1f2a44;
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="overlay">
    <div class="title">NEOMED</div>
    <div class="subtitle">Cuidado personal inteligente</div>
    <button class="btn" onclick="enterSite()">ENTRAR</button>
</div>

<script>
const { Engine, Scene, Vector3, Color3, Color4, ArcRotateCamera, HemisphericLight } = BABYLON;

const canvas = document.getElementById("canvas");
const engine = new Engine(canvas, true);

const scene = (() => {

    const scene = new Scene(engine);
    scene.clearColor = new Color4(1,1,1,1);

    // 📷 Cámara suave
    const camera = new ArcRotateCamera("", -Math.PI/4, Math.PI/2.3, 6, Vector3.Zero(), scene);
    camera.attachControl(canvas, true);
    camera.lowerRadiusLimit = 4;
    camera.upperRadiusLimit = 8;

    // 💡 Luz
    const light = new HemisphericLight("", new Vector3(0,1,0), scene);
    light.intensity = 1.3;

    // =============================
    // 💊 CÁPSULA 3D PREMIUM
    // =============================

    const DIAM = 0.7;
    const LENGTH = 1.6;

    const body = BABYLON.MeshBuilder.CreateCylinder("", {
        height: LENGTH - DIAM,
        diameter: DIAM,
        tessellation: 48
    });
    body.rotation.z = Math.PI/2;

    const capR = BABYLON.MeshBuilder.CreateSphere("", {
        diameter: DIAM,
        segments: 24
    });
    capR.position.x = (LENGTH/2) - (DIAM/2);

    const capL = capR.clone("");
    capL.position.x = -(LENGTH/2) + (DIAM/2);

    const capsule = BABYLON.Mesh.MergeMeshes([body, capR, capL], true, true);

    // 🎨 Material elegante (tipo clínica estética)
    const mat = new BABYLON.PBRMetallicRoughnessMaterial("", scene);
    mat.baseColor = new Color3(1.0, 0.7, 0.82);
    mat.metallic = 0;
    mat.roughness = 0.4;

    capsule.material = mat;

    // ✨ wireframe sutil (look tech/med)
    const wire = capsule.clone("");
    const wireMat = new BABYLON.StandardMaterial("", scene);
    wireMat.emissiveColor = new Color3(1.0, 0.3, 0.55);
    wireMat.wireframe = true;
    wireMat.alpha = 0.25;
    wire.material = wireMat;

    // 📍 CENTRADO REAL
    capsule.position.set(0, 0, 0);
    wire.position.set(0, 0, 0);

    // =============================
    // 🔄 ANIMACIÓN SUAVE
    // =============================

    scene.registerBeforeRender(() => {
        capsule.rotation.y += 0.0025;
        wire.rotation.y += 0.0025;
    });

    // =============================
    // 📱 RESPONSIVE
    // =============================

    const updateScale = () => {
        const w = window.innerWidth;
        let scale = 1;

        if (w < 600) scale = 0.75;
        else if (w < 1024) scale = 1;
        else scale = 1.25;

        capsule.scaling.set(scale, scale, scale);
        wire.scaling.set(scale, scale, scale);
    };

    updateScale();
    window.addEventListener("resize", updateScale);

    // =============================
    // ✨ EFECTOS VISUALES SUAVES
    // =============================

    const pipeline = new BABYLON.DefaultRenderingPipeline("", true, scene, [camera]);
    pipeline.bloomEnabled = true;
    pipeline.bloomWeight = 0.4;
    pipeline.bloomThreshold = 0.6;
    pipeline.fxaaEnabled = true;

    return scene;
})();

engine.runRenderLoop(() => scene.render());

window.addEventListener("resize", () => engine.resize());

/* 🚀 REDIRECCIÓN */
function enterSite() {
    // transición suave opcional
    document.body.style.opacity = 0;
    document.body.style.transition = "opacity 0.6s ease";

    setTimeout(() => {
        window.location.href = "home.html";
    }, 500);
}
</script>

</body>
</html>
