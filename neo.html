<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoMed</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #ffffff;
}

canvas {
    width: 100%;
    height: 100%;
    display: block;
}

/* 🔥 CENTRADO REAL */
.overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;  /* ← clave */
    align-items: center;
    gap: 10px;
    pointer-events: none;
}

.title {
    font-size: 28px;
    letter-spacing: 6px;
    color: #2f3e46;
}

.subtitle {
    font-size: 13px;
    color: #6c757d;
    margin-bottom: 15px;
}

.btn {
    pointer-events: auto;
    padding: 10px 28px;
    background: transparent;
    color: #1f2a44;
    border: 2px solid #1f2a44;
    border-radius: 6px;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.25s ease;
}

.btn:hover {
    background: #1f2a44;
    color: #fff;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="overlay">
    <div class="title">NEOMED</div>
    <div class="subtitle">Cuidado personal inteligente</div>
    <button class="btn" onclick="enterSite()">ENTRAR</button>
</div>

<script>
const { Engine, Scene, Vector3, Color3, Color4, ArcRotateCamera, HemisphericLight } = BABYLON;

const canvas = document.getElementById("canvas");
const engine = new Engine(canvas, true);

const scene = (() => {
    const scene = new Scene(engine);
    scene.clearColor = new Color4(1,1,1,1);

    const camera = new ArcRotateCamera("", -Math.PI/4, Math.PI/2.2, 6, Vector3.Zero(), scene);
    camera.attachControl(canvas, true);

    const light = new HemisphericLight("", new Vector3(0,1,0), scene);
    light.intensity = 1.4;

    // =============================
    // 💊 CÁPSULA
    // =============================

    const DIAM = 0.7;
    const LENGTH = 1.5;

    const body = BABYLON.MeshBuilder.CreateCylinder("", {
        height: LENGTH - DIAM,
        diameter: DIAM,
        tessellation: 32
    });
    body.rotation.z = Math.PI/2;

    const capR = BABYLON.MeshBuilder.CreateSphere("", {
        diameter: DIAM,
        segments: 16
    });
    capR.position.x = (LENGTH/2) - (DIAM/2);

    const capL = capR.clone("");
    capL.position.x = -(LENGTH/2) + (DIAM/2);

    const capsule = BABYLON.Mesh.MergeMeshes([body, capR, capL], true, true);

    // 🎨 material rosado
    const baseMat = new BABYLON.PBRMetallicRoughnessMaterial("", scene);
    baseMat.baseColor = new Color3(1.0, 0.65, 0.78);
    baseMat.metallic = 0;
    baseMat.roughness = 0.55;

    capsule.material = baseMat;

    // 🧵 wireframe
    const wire = capsule.clone("");
    const wireMat = new BABYLON.StandardMaterial("", scene);
    wireMat.emissiveColor = new Color3(1.0, 0.2, 0.45);
    wireMat.wireframe = true;
    wire.material = wireMat;

    // =============================
    // 📍 CENTRADO REAL 3D
    // =============================

    capsule.position.set(0, 0, 0);
    wire.position.set(0, 0, 0);

    // =============================
    // 🔄 ANIMACIÓN
    // =============================

    scene.registerBeforeRender(() => {
        capsule.rotation.y += 0.003;
        wire.rotation.y += 0.003;
    });

    // =============================
    // 📱 RESPONSIVE ESCALA
    // =============================

    const updateScale = () => {
        const w = window.innerWidth;

        let scale = 1;

        if (w < 600) scale = 0.8;
        else if (w < 1024) scale = 1;
        else scale = 1.2;

        capsule.scaling.set(scale, scale, scale);
        wire.scaling.set(scale, scale, scale);
    };

    updateScale();
    window.addEventListener("resize", updateScale);

    // =============================
    // ✨ FX
    // =============================

    const pl = new BABYLON.DefaultRenderingPipeline("", true, scene, [camera]);
    pl.bloomEnabled = true;
    pl.bloomWeight = 0.5;
    pl.fxaaEnabled = true;

    return scene;
})();

engine.runRenderLoop(() => scene.render());

function enterSite() {
    window.location.href = "home.html";
}
</script>

</body>
</html>
